<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI 無人機 2026 旗艦對比 · 香港</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['"Bebas Neue"', 'cursive'],
          sans: ['"Noto Sans TC"', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
        colors: {
          bg: '#060a12',
          surface: '#0b1120',
          glass: 'rgba(255,255,255,0.04)',
          cyan: { DEFAULT: '#00d4ff', dim: '#00a8cc' },
          gold: '#f5c842',
          ember: '#ff5c1a',
          violet: '#9b6dff',
          mint: '#3dffa0',
        },
        backdropBlur: { xl: '24px' },
      }
    }
  }
</script>

<!-- GSAP + ScrollTrigger + Flip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>

<style>
  /* ─── BASE ─── */
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: #060a12;
    color: #e8f4ff;
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #060a12; }
  ::-webkit-scrollbar-thumb { background: #00d4ff44; border-radius: 2px; }

  /* ─── NOISE TEXTURE ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── GRID OVERLAY ─── */
  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── GLASS CARD ─── */
  .glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .glass-strong {
    background: rgba(11,17,32,0.85);
    backdrop-filter: blur(32px) saturate(200%);
    -webkit-backdrop-filter: blur(32px) saturate(200%);
    border: 1px solid rgba(0,212,255,0.12);
  }

  /* ─── GLOW BORDERS ─── */
  .glow-cyan { box-shadow: 0 0 20px rgba(0,212,255,0.15), inset 0 0 20px rgba(0,212,255,0.03); }
  .glow-gold { box-shadow: 0 0 20px rgba(245,200,66,0.15), inset 0 0 20px rgba(245,200,66,0.03); }
  .glow-ember { box-shadow: 0 0 20px rgba(255,92,26,0.2), inset 0 0 20px rgba(255,92,26,0.05); }
  .glow-violet { box-shadow: 0 0 20px rgba(155,109,255,0.15), inset 0 0 20px rgba(155,109,255,0.03); }
  .glow-mint { box-shadow: 0 0 20px rgba(61,255,160,0.15), inset 0 0 20px rgba(61,255,160,0.03); }

  /* ─── HERO ─── */
  .hero-gradient {
    background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 20% 100%, rgba(155,109,255,0.06) 0%, transparent 50%),
                #060a12;
  }

  /* ─── DRONE IMAGE CONTAINER ─── */
  .drone-img-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    overflow: hidden;
  }
  .drone-img-wrap img {
    max-height: 180px;
    max-width: 90%;
    object-fit: contain;
    filter: drop-shadow(0 12px 40px rgba(0,212,255,0.25));
    transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
    will-change: transform;
    transform: translate3d(0,0,0);
  }
  .drone-card:hover .drone-img-wrap img {
    transform: translate3d(0,-8px,0) scale(1.04);
    filter: drop-shadow(0 20px 60px rgba(0,212,255,0.35));
  }
  .drone-img-glow {
    position: absolute;
    bottom: -20px;
    left: 50%; transform: translateX(-50%);
    width: 140px; height: 40px;
    border-radius: 50%;
    filter: blur(20px);
    opacity: 0.5;
  }

  /* ─── DRONE CARD ─── */
  .drone-card {
    border-radius: 20px;
    transition: transform 0.4s cubic-bezier(0.25,1,0.5,1), box-shadow 0.4s ease;
    will-change: transform;
    transform: translate3d(0,0,0);
    position: relative;
    overflow: hidden;
  }
  .drone-card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .drone-card:hover {
    transform: translate3d(0,-6px,0);
  }
  .drone-card.flagship {
    border-color: rgba(255,92,26,0.3) !important;
  }

  /* ─── STICKY COMPARE HEADER ─── */
  #sticky-header {
    position: sticky;
    top: 0;
    z-index: 100;
    transform: translate3d(0,0,0);
    backdrop-filter: blur(32px) saturate(200%);
    -webkit-backdrop-filter: blur(32px) saturate(200%);
    background: rgba(6,10,18,0.92);
    border-bottom: 1px solid rgba(0,212,255,0.1);
    transition: box-shadow 0.3s ease;
  }
  #sticky-header.scrolled {
    box-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }
  .sticky-drone-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 8px;
  }
  .sticky-drone-col img {
    height: 52px;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,212,255,0.3));
    transition: transform 0.3s cubic-bezier(0.25,1,0.5,1);
  }
  .sticky-drone-col:hover img { transform: translateY(-3px) scale(1.05); }
  .sticky-drone-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-align: center;
    white-space: nowrap;
  }
  .sticky-drone-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    opacity: 0.6;
    text-align: center;
  }

  /* ─── SPEC TABLE ─── */
  .spec-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .spec-table thead th {
    padding: 0;
    font-weight: normal;
    border: none;
  }
  .spec-table tbody tr {
    transition: background 0.2s ease;
  }
  .spec-table tbody tr:hover td {
    background: rgba(0,212,255,0.03);
  }
  .spec-group-row td {
    background: rgba(0,212,255,0.04) !important;
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #00d4ff;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0,212,255,0.1);
  }
  .spec-label-col {
    padding: 14px 20px;
    font-size: 13px;
    color: rgba(232,244,255,0.65);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    white-space: nowrap;
    width: 180px;
  }
  .spec-val-col {
    padding: 14px 12px;
    font-size: 13px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: color 0.2s ease;
    vertical-align: middle;
  }
  .spec-val-col.best { color: #00d4ff; font-weight: 600; }
  .spec-val-col.good { color: #f5c842; }
  .spec-val-col.check { color: #3dffa0; }
  .spec-val-col.cross { color: rgba(255,255,255,0.2); }
  .spec-val-col.flagship-col { color: #ff5c1a; }

  /* ─── PROGRESS BAR ─── */
  .bar-wrap { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1.2s cubic-bezier(0.23,1,0.32,1); }

  /* ─── BADGE ─── */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .badge-cyan { background: rgba(0,212,255,0.12); color: #00d4ff; border: 1px solid rgba(0,212,255,0.25); }
  .badge-gold { background: rgba(245,200,66,0.12); color: #f5c842; border: 1px solid rgba(245,200,66,0.25); }
  .badge-ember { background: rgba(255,92,26,0.15); color: #ff5c1a; border: 1px solid rgba(255,92,26,0.3); }
  .badge-violet { background: rgba(155,109,255,0.12); color: #9b6dff; border: 1px solid rgba(155,109,255,0.25); }
  .badge-mint { background: rgba(61,255,160,0.1); color: #3dffa0; border: 1px solid rgba(61,255,160,0.2); }
  .badge-new { background: linear-gradient(90deg,rgba(61,255,160,0.15),rgba(0,212,255,0.1)); color: #3dffa0; border: 1px solid rgba(61,255,160,0.3); animation: newPulse 2s ease-in-out infinite; }
  @keyframes newPulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

  /* ─── SCORE RING ─── */
  .score-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); }
  .score-ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(0.23,1,0.32,1); }
  .score-ring-text { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; }

  /* ─── CTA BUTTON ─── */
  .cta-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    border: none;
    transition: transform 0.25s cubic-bezier(0.25,1,0.5,1), box-shadow 0.25s ease, background 0.2s ease;
    will-change: transform;
    transform: translate3d(0,0,0);
  }
  .cta-btn:hover { transform: translate3d(0,-2px,0); }
  .cta-btn:active { transform: translate3d(0,1px,0); }
  .cta-primary {
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
  }
  .cta-primary:hover { box-shadow: 0 8px 32px rgba(0,212,255,0.45); }
  .cta-ghost {
    background: rgba(255,255,255,0.05);
    color: #e8f4ff;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .cta-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,212,255,0.3); }

  /* ─── TAB NAV ─── */
  .tab-btn {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.25,1,0.5,1);
    border: 1px solid transparent;
    color: rgba(255,255,255,0.45);
    background: transparent;
  }
  .tab-btn.active {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.3);
    color: #00d4ff;
  }
  .tab-btn:hover:not(.active) {
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.04);
  }

  /* ─── FLOAT ANIMATION ─── */
  @keyframes floatY {
    0%,100% { transform: translate3d(0,0,0); }
    50% { transform: translate3d(0,-10px,0); }
  }
  .float-anim { animation: floatY 5s ease-in-out infinite; }

  /* ─── COMPARE HIGHLIGHT ─── */
  .col-highlight { background: rgba(0,212,255,0.04); }

  /* ─── DETAIL EXPAND ─── */
  .expand-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.5s cubic-bezier(0.25,1,0.5,1), opacity 0.4s ease;
    opacity: 0;
  }
  .expand-panel.open {
    max-height: 600px;
    opacity: 1;
  }

  /* ─── SCROLL REVEAL ─── */
  .reveal { opacity: 0; transform: translate3d(0, 40px, 0); }

  /* ─── ICON ─── */
  .icon-check { color: #3dffa0; }
  .icon-cross { color: rgba(255,255,255,0.2); }

  /* ─── COMPARE SECTION BG ─── */
  .compare-section {
    background: linear-gradient(180deg, #060a12 0%, #080d18 50%, #060a12 100%);
  }
</style>
</head>
<body>
<div class="grid-overlay"></div>

<!-- ═══════════════════════════════════════ HERO ═══════════════════════════════════════ -->
<section class="hero-gradient relative min-h-screen flex flex-col items-center justify-center px-6 py-24 overflow-hidden" style="z-index:1">

  <!-- Ambient glows -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] rounded-full pointer-events-none" style="background:radial-gradient(ellipse,rgba(0,212,255,0.08) 0%,transparent 70%);filter:blur(2px)"></div>
  <div class="absolute bottom-0 left-1/4 w-[400px] h-[300px] rounded-full pointer-events-none" style="background:radial-gradient(ellipse,rgba(155,109,255,0.06) 0%,transparent 70%)"></div>

  <!-- Badge -->
  <div class="badge badge-cyan mb-6 reveal" id="hero-badge">
    <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 mr-2" style="animation:newPulse 1.5s infinite"></span>
    HONG KONG 2026 · 最新旗艦陣容
  </div>

  <!-- Title -->
  <h1 class="text-center reveal" id="hero-title" style="font-family:'Bebas Neue',cursive; font-size:clamp(64px,12vw,160px); line-height:0.88; letter-spacing:0.01em;">
    <span style="color:#e8f4ff">DJI</span><br>
    <span style="background:linear-gradient(90deg,#00d4ff,#9b6dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">無人機</span><br>
    <span style="color:#e8f4ff; font-size:0.55em; letter-spacing:0.08em;">6強旗艦對比</span>
  </h1>

  <!-- Sub -->
  <p class="mt-6 text-center font-mono text-sm tracking-widest reveal" style="color:rgba(232,244,255,0.45); letter-spacing:0.2em" id="hero-sub">
    MAVIC · AIR · MINI · LITO · AVATA · NEO
  </p>

  <!-- CTA -->
  <div class="flex gap-4 mt-10 reveal" id="hero-cta">
    <a href="#compare" class="cta-btn cta-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      立即比較
    </a>
    <a href="#cards" class="cta-btn cta-ghost">查看全部機型</a>
  </div>

  <!-- Drone preview strip -->
  <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-8 px-6 reveal" id="hero-strip">
    <div class="text-center opacity-60 text-xs font-mono tracking-widest" style="color:rgba(232,244,255,0.4)">↓ 向下滾動探索</div>
  </div>

  <!-- Floating drones decoration -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden" style="z-index:-1">
    <div class="float-anim absolute" style="right:5%;top:15%;animation-delay:-2s;opacity:0.06">
      <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
        <ellipse cx="100" cy="100" rx="80" ry="10" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4 4"/>
        <circle cx="100" cy="100" r="8" fill="rgba(0,212,255,0.3)"/>
        <line x1="20" y1="100" x2="60" y2="80" stroke="#00d4ff" stroke-width="0.5"/>
        <line x1="180" y1="100" x2="140" y2="80" stroke="#00d4ff" stroke-width="0.5"/>
        <line x1="20" y1="100" x2="60" y2="120" stroke="#00d4ff" stroke-width="0.5"/>
        <line x1="180" y1="100" x2="140" y2="120" stroke="#00d4ff" stroke-width="0.5"/>
      </svg>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════ CARDS ═══════════════════════════════════════ -->
<section id="cards" class="relative px-4 md:px-8 lg:px-12 pb-24" style="z-index:1">

  <div class="max-w-[1400px] mx-auto">
    <!-- Section heading -->
    <div class="mb-12 reveal">
      <p class="font-mono text-xs tracking-widest mb-3" style="color:#00d4ff;letter-spacing:0.25em">// 06 MODELS</p>
      <h2 class="text-5xl font-display tracking-wide text-white">全系列機型</h2>
    </div>

    <!-- 6-column card grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-5" id="drone-cards-grid">
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════ COMPARE ═══════════════════════════════════════ -->
<section id="compare" class="compare-section relative" style="z-index:1">

  <!-- STICKY HEADER -->
  <div id="sticky-header">
    <div class="max-w-[1400px] mx-auto px-4 md:px-8">
      <div class="grid" id="sticky-grid" style="grid-template-columns: 180px repeat(6, 1fr);">
        <!-- Label -->
        <div class="flex items-center px-5 py-3">
          <span class="font-mono text-xs tracking-widest" style="color:rgba(232,244,255,0.35)">// SPEC</span>
        </div>
        <!-- Drone cols — filled by JS -->
      </div>
    </div>
  </div>

  <!-- Section heading -->
  <div class="max-w-[1400px] mx-auto px-4 md:px-8 pt-20 pb-10 reveal">
    <p class="font-mono text-xs tracking-widest mb-3" style="color:#00d4ff;letter-spacing:0.25em">// FULL SPEC COMPARISON</p>
    <h2 class="text-5xl font-display tracking-wide text-white mb-2">詳細規格對比</h2>
    <p class="text-sm" style="color:rgba(232,244,255,0.45)">以下價格為香港官方 / 授權零售商起步價，僅供參考</p>
  </div>

  <!-- Tab nav -->
  <div class="max-w-[1400px] mx-auto px-4 md:px-8 mb-8 reveal">
    <div class="flex flex-wrap gap-2" id="tab-nav">
      <button class="tab-btn active" data-tab="all">全部規格</button>
      <button class="tab-btn" data-tab="image">📷 影像</button>
      <button class="tab-btn" data-tab="flight">✈️ 飛行</button>
      <button class="tab-btn" data-tab="safety">🛡️ 安全避障</button>
      <button class="tab-btn" data-tab="smart">🤖 智能功能</button>
    </div>
  </div>

  <!-- Table wrapper -->
  <div class="max-w-[1400px] mx-auto px-4 md:px-8 pb-32 overflow-x-auto reveal">
    <div class="glass-strong rounded-2xl overflow-hidden" style="min-width:900px">
      <table class="spec-table" id="spec-table">
        <thead>
          <tr id="table-header-row">
            <th class="spec-label-col text-left font-mono text-xs tracking-widest" style="color:rgba(232,244,255,0.3);padding:16px 20px;border-bottom:1px solid rgba(0,212,255,0.1)">規格</th>
            <!-- drone cols filled by JS -->
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- rows filled by JS -->
        </tbody>
      </table>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════ FOOTER ═══════════════════════════════════════ -->
<footer class="border-t py-12 px-8" style="border-color:rgba(255,255,255,0.06);z-index:1;position:relative">
  <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
    <div>
      <p class="font-display text-2xl tracking-widest" style="color:rgba(232,244,255,0.8)">DJI HK 2026</p>
      <p class="font-mono text-xs mt-1" style="color:rgba(232,244,255,0.3)">資料來源：DJI 官網 · Fortress HK · 各大評測媒體 · 價格以港幣計算，以實際零售為準</p>
    </div>
    <div class="flex gap-4">
      <a href="https://www.dji.com/hk" target="_blank" class="cta-btn cta-ghost text-xs px-4 py-2">dji.com/hk ↗</a>
      <a href="https://www.fortress.com.hk" target="_blank" class="cta-btn cta-ghost text-xs px-4 py-2">Fortress HK ↗</a>
    </div>
  </div>

/* ─── BEST VALUE HELPERS ─── */
function getBestVals(key) {
  // For boolean rows, "best" = true; for numeric, find max
  const vals = DRONES.map(d => {
    const raw = SPEC_ROWS.find(r => r.key === key);
    return raw ? raw.format(d) : '';
  });
  return vals;
}

/* ─── CELL CLASS ─── */
function getCellClass(key, val, drone) {
  if (val === '✓') return 'spec-val-col check';
  if (val === '✗') return 'spec-val-col cross';
  // Highlight bests per column
  const highlights = {
    maxVideo: ['8K 360°/60fps HDR', '6K/60fps HDR'],
    maxBitrate: ['200 Mbps', '180 Mbps'],
    maxPhoto: ['120MP (360°)', '100MP'],
    flightTime: ['51 分鐘', '45 分鐘'],
    txRange: ['30km', '20km'],
    lenses: ['3 個', '2 個'],
  };
  if (highlights[key]) {
    if (highlights[key][0] === val) return 'spec-val-col best';
    if (highlights[key][1] === val) return 'spec-val-col good';
  }
  if (key === 'price') {
    if (drone.id === 'mavic4pro') return 'spec-val-col flagship-col';
  }
  return 'spec-val-col';
}

/* ─── BUILD CARDS ─── */
function buildCards() {

    card.className = `drone-card glass ${d.glowClass} ${d.flagship ? 'flagship' : ''} reveal`;

    card.dataset.id = d.id;

    // Score rings HTML
    const ringSize = 48, r = 18, circ = 2 * Math.PI * r;
    const scoreRingsHtml = SCORE_DIMS.map(dim => {
      const pct = d.scores[dim.key] / 100;
      const offset = circ * (1 - pct);
      return `
        <div class="score-ring-wrap" style="width:${ringSize}px;height:${ringSize}px">
          <svg width="${ringSize}" height="${ringSize}" viewBox="0 0 ${ringSize} ${ringSize}">
            <circle class="score-ring-bg" cx="${ringSize/2}" cy="${ringSize/2}" r="${r}" stroke-width="3"/>
            <circle class="score-ring-fill ring-${d.id}-${dim.key}" cx="${ringSize/2}" cy="${ringSize/2}" r="${r}" 
              stroke="${dim.color}" stroke-width="3"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${circ}"

      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        ${makeImg(d, '', `height:36px;max-width:70px;object-fit:contain;filter:drop-shadow(0 4px 12px ${d.accentColor}55);`)}
        <span class="font-display tracking-wide text-base" style="color:${d.accentColor}">${d.name}</span>
      </div>
    `;
    headerRow.appendChild(th);
  });

  // Build body
  tbody.innerHTML = '';
  const visibleRows = SPEC_ROWS.filter(r => !r.category || tab === 'all' || r.category === tab || r.group);

  const state = Flip.getState(tbody);

  visibleRows.forEach(row => {
    if (row.group) {
      const tr = document.createElement('tr');
      tr.className = 'spec-group-row';
      const td = document.createElement('td');
      td.colSpan = DRONES.length + 1;
      td.textContent = row.group;
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    const tr = document.createElement('tr');
    tr.dataset.key = row.key;

    const tdLabel = document.createElement('td');
    tdLabel.className = 'spec-label-col';
    tdLabel.textContent = row.label;
    tr.appendChild(tdLabel);

    DRONES.forEach((d, i) => {
      const td = document.createElement('td');
      const val = row.format(d);
      td.className = getCellClass(row.key, val, d);
      if (i > 0) td.style.borderLeft = '1px solid rgba(255,255,255,0.04)';
      // Icon formatting
      if (val === '✓') { td.innerHTML = '<span class="icon-check text-base">✓</span>'; }
      else if (val === '✗') { td.innerHTML = '<span class="icon-cross text-base">✗</span>'; }
      else td.textContent = val;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // FLIP animate
  Flip.from(state, {
    duration: 0.4,
    ease: 'power2.out',
    stagger: 0.02,
    absolute: true,
  });
}

/* ─── INIT ─── */
buildCards();
buildStickyHeader();
buildTable('all');

/* ─── TAB SWITCHING ─── */
document.getElementById('tab-nav').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTable(btn.dataset.tab);
  // Animate rows in
  gsap.from('#table-body tr', {
    opacity: 0,
    y: 12,
    stagger: 0.03,
    duration: 0.4,
    ease: 'power2.out',
    clearProps: 'all',
  });
});

/* ─── STICKY HEADER SCROLL ─── */
window.addEventListener('scroll', () => {
  const sh = document.getElementById('sticky-header');
  sh.classList.toggle('scrolled', window.scrollY > 80);
}, { passive: true });

/* ─── GSAP HERO ANIMATIONS ─── */
const heroTl = gsap.timeline({ delay: 0.1 });
heroTl
  .from('#hero-badge', { opacity: 0, y: 30, duration: 0.7, ease: 'power3.out' })
  .from('#hero-title', {
    opacity: 0, y: 60, duration: 1, ease: 'power3.out',
    clearProps: 'transform',
  }, '-=0.3')
  .from('#hero-sub', { opacity: 0, y: 20, duration: 0.6, ease: 'power2.out' }, '-=0.5')
  .from('#hero-cta', { opacity: 0, y: 20, duration: 0.6, ease: 'power2.out' }, '-=0.4')
  .from('#hero-strip', { opacity: 0, y: 10, duration: 0.5 }, '-=0.3');

/* ─── SCROLLTRIGGER: reveal elements ─── */
ScrollTrigger.batch('.reveal', {
  onEnter: batch => {
    gsap.to(batch, {
      opacity: 1,
      y: 0,
      stagger: 0.1,
      duration: 0.8,
      ease: 'power3.out',
      clearProps: 'transform',
    });
  },
  start: 'top 88%',
  once: true,
});

/* ─── SCROLLTRIGGER: stagger card entries ─── */
ScrollTrigger.create({
  trigger: '#drone-cards-grid',
  start: 'top 85%',
  once: true,
  onEnter: () => {
    gsap.from('.drone-card', {
      opacity: 0,
      y: 60,
      scale: 0.94,
      stagger: 0.08,
      duration: 0.85,
      ease: 'power3.out',
      clearProps: 'transform,opacity,scale',
    });
  }
});

/* ─── SCROLLTRIGGER: score rings ─── */
ScrollTrigger.create({
  trigger: '#drone-cards-grid',
  start: 'top 70%',
  once: true,
  onEnter: () => {
    DRONES.forEach(d => {
      SCORE_DIMS.forEach(dim => {
        const el = document.querySelector(`.ring-${d.id}-${dim.key}`);
        if (!el) return;
        const offset = parseFloat(el.dataset.offset);
        gsap.to(el, {
          strokeDashoffset: offset,
          duration: 1.4,
          delay: Math.random() * 0.3,
          ease: 'power3.out',
        });
      });
    });
  }
});

/* ─── SCROLLTRIGGER: table rows stagger ─── */
ScrollTrigger.create({
  trigger: '#spec-table',
  start: 'top 80%',
  once: true,
  onEnter: () => {
    gsap.from('#table-body tr', {
      opacity: 0,
      x: -20,
      stagger: 0.03,
      duration: 0.55,
      ease: 'power2.out',
      clearProps: 'all',
    });
  }
});

/* ─── CARD HOVER SPRING ─── */
document.querySelectorAll('.drone-card').forEach(card => {
  card.addEventListener('mouseenter', () => {
    gsap.to(card, {
      y: -6, scale: 1.01,
      duration: 0.45,
      ease: 'cubic-bezier(0.25, 1, 0.5, 1)',
    });
  });
  card.addEventListener('mouseleave', () => {
    gsap.to(card, {
      y: 0, scale: 1,
      duration: 0.5,
      ease: 'elastic.out(1, 0.5)',
    });
  });
});

/* ─── BUTTON SPRING ─── */
document.querySelectorAll('.cta-btn, .tab-btn').forEach(btn => {
  btn.addEventListener('mousedown', () => {
    gsap.to(btn, { scale: 0.95, duration: 0.1, ease: 'power2.in' });
  });
  btn.addEventListener('mouseup', () => {
    gsap.to(btn, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.4)' });
  });
  btn.addEventListener('mouseleave', () => {
    gsap.to(btn, { scale: 1, duration: 0.3, ease: 'power2.out' });
  });
});

/* ─── IMAGE ERROR HANDLING (graceful SVG fallback) ─── */
function buildFallbackSVG(d) {
  const c = d.accentColor;
  return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 260 160' fill='none'>
    <rect width='260' height='160' rx='12' fill='%230b1120'/>
    <text x='130' y='60' text-anchor='middle' font-family='monospace' font-size='11' fill='${encodeURIComponent(c)}' opacity='0.5' letter-spacing='3'>${d.short}</text>
    <!-- Body -->
    <rect x='105' y='70' width='50' height='26' rx='5' fill='%231a2540' stroke='${encodeURIComponent(c)}' stroke-width='1.2' opacity='0.8'/>
    <!-- Arms -->
    <line x1='105' y1='76' x2='55' y2='48' stroke='%232a3a5a' stroke-width='3.5' stroke-linecap='round'/>
    <line x1='155' y1='76' x2='205' y2='48' stroke='%232a3a5a' stroke-width='3.5' stroke-linecap='round'/>
    <line x1='105' y1='90' x2='55' y2='118' stroke='%232a3a5a' stroke-width='3.5' stroke-linecap='round'/>
    <line x1='155' y1='90' x2='205' y2='118' stroke='%232a3a5a' stroke-width='3.5' stroke-linecap='round'/>
    <!-- Props -->
    <ellipse cx='55' cy='44' rx='24' ry='5' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='1.2' opacity='0.7'/>
    <ellipse cx='205' cy='44' rx='24' ry='5' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='1.2' opacity='0.7'/>
    <ellipse cx='55' cy='122' rx='24' ry='5' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='1.2' opacity='0.7'/>
    <ellipse cx='205' cy='122' rx='24' ry='5' fill='none' stroke='${encodeURIComponent(c)}' stroke-width='1.2' opacity='0.7'/>
    <!-- Camera -->
    <circle cx='130' cy='83' r='7' fill='${encodeURIComponent(c)}' opacity='0.4'/>
    <circle cx='130' cy='83' r='3.5' fill='${encodeURIComponent(c)}' opacity='0.7'/>
    <text x='130' y='145' text-anchor='middle' font-family='monospace' font-size='9' fill='white' opacity='0.3'>${d.name}</text>
  </svg>`;
}

// Apply fallback to all drone images
setTimeout(() => {
  document.querySelectorAll('img').forEach(img => {
    img.addEventListener('error', function() {
      const id = this.closest('[data-id]')?.dataset?.id;
      if (id) {
        const d = DRONES.find(x => x.id === id);
        if (d) { this.src = buildFallbackSVG(d); this.onerror = null; }
      }
    });
  });
}, 100);

/* ─── GPU HINTS ─── */
document.querySelectorAll('.drone-card, .cta-btn, .tab-btn, .sticky-drone-col').forEach(el => {
  el.style.willChange = 'transform';
});
</script>
